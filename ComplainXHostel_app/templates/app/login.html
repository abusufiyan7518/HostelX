{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login | HostelX Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- ✅ FAVICON -->
<link rel="icon" href="{% static 'images/HostelX_favicon.jpeg' %}">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:#0a0f1c;
    color:#e5e7eb;
    overflow:hidden;
}

/* BACKGROUND EFFECT */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(229,9,20,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(79,70,229,0.20), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(34,197,94,0.10), transparent 50%);
    z-index:-1;
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:70px 70px;
    opacity:0.08;
    z-index:-1;
}

/* LEFT PANEL */
.left{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:60px;
    text-align:center;
}

.left img{
    width:95%;
    max-width:700px;
    border-radius:18px;
    box-shadow:0 30px 80px rgba(0, 0, 0, 0.6);
    transition:0.3s;
}

.left img:hover{
    transform:scale(1.03);
}

.left h2{
    margin-top:22px;
    font-size:22px;
    color:#e50914;
    font-weight:700;
}

.left p{
    color:#94a3b8;
    font-size:14px;
    margin-top:8px;
    max-width:650px;
}

/* RIGHT PANEL */
.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* LOGIN CARD */
.card{
    width:380px;
    padding:32px;
    border-radius:18px;
    background:rgba(17,24,39,0.75);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow:0 40px 100px rgba(0,0,0,0.6);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

/* TITLE */
.card h2{
    font-size:22px;
    font-weight:700;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:18px;
}

/* INPUT */
.input-box{
    margin-bottom:14px;
}

input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
    background:#0f172a;
    color:#e5e7eb;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#e50914;
    box-shadow:0 0 0 3px rgba(229,9,20,0.15);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#e50914,#7c3aed);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#b20710;
    transform:translateY(-2px);
}

/* ERROR */
.error{
    color:#f87171;
    font-size:13px;
    margin-bottom:10px;
}

/* FOOTER LINK */
.link{
    text-align:center;
    margin-top:14px;
    font-size:13px;
    color:#94a3b8;
}

.link a{
    color:#e50914;
    text-decoration:none;
    font-weight:500;
}

.link a:hover{
    text-decoration:underline;
}

/* RESPONSIVE */
@media(max-width:900px){
    .left{
        display:none;
    }
    .right{
        flex:1;
    }
}

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <img src="{% static 'images/HostelX_login.jpeg' %}" alt="Hostel">
    <h2>HostelX Intelligence System</h2>
    <p>Smart SaaS dashboard for students, wardens, complaints & fee analytics in real-time</p>
</div>

<!-- RIGHT -->
<div class="right">

    <div class="card">

        <h2 >Student Sign In </h2>
        <div class="subtitle">Sign in to continue dashboard access</div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-box">
                <input type="email" name="email" placeholder="Email address" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div class="link">
            New user?
            <a href="{% url 'register' %}">Create account</a>
        </div>

    </div>

</div>

</body>
</html>
