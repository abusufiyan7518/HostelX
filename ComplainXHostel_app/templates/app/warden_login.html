{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Warden Login | HostelX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" href="{% static 'images/HostelX_favicon.jpeg' %}">

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0f;
}

/* ================= MAIN WRAPPER ================= */
.wrapper{
    width:1000px;
    height:600px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,0.6);
}

/* ================= LEFT PANEL (IMAGE) ================= */
.left{
    flex:1.7;
    position:relative;
     background:
        linear-gradient(rgba(0, 0, 0, 0.46), rgba(0, 0, 0, 0.41)),
        url("{% static 'images/HostelX_wardenLogin.jpeg' %}"); 
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.left h2{
    color:#fff;
    font-size:26px;
    font-weight:700;
}

.left p{
    color:#cbd5e1;
    margin-top:10px;
    font-size:14px;
    max-width:300px;
}

/* ================= RIGHT PANEL ================= */
.right{
    flex:1;
    background:rgba(15,15,20,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* ================= CARD ================= */
.card{
    width:100%;
    max-width:340px;
}

.logo{
    font-size:11px;
    letter-spacing:2.5px;
    color:#e50914;
    font-weight:700;
    margin-bottom:12px;
}

h2{
    font-size:22px;
    color:#fff;
    margin-bottom:6px;
}

p{
    color:#9ca3af;
    font-size:13px;
    margin-bottom:20px;
}

/* ================= INPUT ================= */
input{
    width:100%;
    padding:13px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(30,30,40,0.8);
    color:#fff;
    outline:none;
}

input:focus{
    border-color:#e50914;
}

/* ================= BUTTON ================= */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#e50914,#7c3aed);
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:translateY(-2px);
}

/* ================= ERROR ================= */
.error{
    background:rgba(239,68,68,0.15);
    color:#f87171;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:12px;
}

/* ================= FOOTER ================= */
.footer{
    margin-top:16px;
    text-align:center;
    font-size:11px;
    color:#64748b;
}

</style>

</head>

<body>

<div class="wrapper">

    <!-- LEFT IMAGE PANEL -->
    <div class="left">
    </div>

    <!-- RIGHT LOGIN PANEL -->
    <div class="right">

        <div class="card">

            <div class="logo">HOSTELX ACCESS</div>

            <h2 style>Warden Sign In</h2>
            <p>Secure admin control panel access</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <input type="email" name="email" placeholder="Email address" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Sign In</button>
            </form>

            <div class="footer">
                🔒 Authorized access only
            </div>

        </div>

    </div>

</div>

</body>
</html>
