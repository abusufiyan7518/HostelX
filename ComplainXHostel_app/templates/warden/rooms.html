{% extends 'warden/base.html' %}
{% block content %}

<style>
.page-title{
    font-size:22px;
    font-weight:600;
    margin-bottom:20px;
    color:#e2e8f0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:16px;
}

.card{
    background:rgba(15,23,42,0.85);
    border:1px solid rgba(255,255,255,0.06);
    padding:16px;
    border-radius:14px;
    transition:0.25s;
    position:relative;
}

/* AC ROOM */
.card.ac{
    border:1px solid #38bdf8;
    box-shadow:0 0 12px rgba(56,189,248,0.3);
}

.badge{
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
}

.full{background:#ef4444;}
.avail{background:#22c55e;}
.ac-badge{background:#38bdf8; margin-left:6px;}

.bar{
    height:8px;
    background:#0f172a;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#6366f1,#22c55e);
}

/* STUDENT BOX (DRAG ENABLED) */
.student{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
    cursor:grab;
}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>

<h2 class="page-title">🏠 Room Allocation (Drag & Drop)</h2>

<div class="grid" id="roomGrid"></div>

<script>

/* ================= LOAD ROOMS ================= */
function loadRooms(){

    fetch("/api/rooms/status/")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.rooms.forEach(r => {

            let percent = (r.occupied / r.capacity) * 100;

            let studentsHTML = "";

            r.students.forEach(s => {
                studentsHTML += `
                <div class="student"
                     draggable="true"
                     ondragstart="drag(event, ${s.id})">

                    <b>${s.name}</b>
                    <div class="small">${s.course} • Year ${s.year}</div>

                </div>
                `;
            });

            html += `
            <div class="card ${r.is_ac ? 'ac' : ''}"
                 ondrop="drop(event, ${r.id}, ${r.capacity}, ${r.occupied})"
                 ondragover="allowDrop(event, ${r.capacity}, ${r.occupied})">

                <h3>Room ${r.room} (F${r.floor})</h3>

                <p>
                    <span class="badge ${r.status === 'Full' ? 'full' : 'avail'}">
                        ${r.status}
                    </span>

                    ${r.is_ac ? '<span class="badge ac-badge">AC</span>' : ''}
                </p>

                <p class="small">${r.occupied}/${r.capacity} Occupied</p>

                <div class="bar">
                    <div class="fill" style="width:${percent}%"></div>
                </div>

                ${studentsHTML}

            </div>
            `;
        });

        document.getElementById("roomGrid").innerHTML = html;
    });
}

/* ================= DRAG ================= */
function drag(ev, studentId){
    ev.dataTransfer.setData("student_id", studentId);
}

/* ================= ALLOW DROP ================= */
function allowDrop(ev, capacity, occupied){
    if (occupied >= capacity){
        return false;
    }
    ev.preventDefault();
}

/* ================= DROP ================= */
function drop(ev, roomId, capacity, occupied){

    ev.preventDefault();

    if (occupied >= capacity){
        alert("❌ Room FULL");
        return;
    }

    const studentId = ev.dataTransfer.getData("student_id");

    fetch("/shift-student/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: `student_id=${studentId}&room_id=${roomId}`
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            loadRooms();
        } else {
            alert(data.message);
        }

    });
}

/* ================= CSRF ================= */
function getCSRFToken(){
    return document.cookie
        .split("; ")
        .find(row => row.startsWith("csrftoken"))
        ?.split("=")[1];
}

/* INIT */
loadRooms();
setInterval(loadRooms, 5000);

</script>

{% endblock %}
